<body>
  <div class="box">
    <h1>Shipping Label Generator</h1>
    <p>Convert Shopify order report into courier bulk upload template.</p>

    <label>Select Country</label>
    <select id="country">
      <option value="VN">Vietnam - SPX</option>
      <option value="TH">Thailand - SPX</option>
    </select>

    <label>CSV Encoding</label>
    <select id="encoding">
      <option value="UTF-8">UTF-8</option>
      <option value="windows-1258">Windows-1258 Vietnamese</option>
      <option value="ISO-8859-1">ISO-8859-1</option>
    </select>

    <label>Upload Shopify Order Report CSV</label>
    <input type="file" id="csvFile" accept=".csv">

    <button onclick="generateTemplate()">Generate Template</button>

    <div class="note">
      Vietnam and Thailand mapping are active.<br>
      Default parcel setting: 2KG, 14cm x 28cm x 36cm.<br>
      Backend template files required in GitHub root: spx-vn-template.xlsx and spx-th-template.xlsx.
    </div>

    <div id="result" class="result"></div>
  </div>

    const thManualAddressAliases = [
      {
        keywords: ["tungyao", "tung yao", "thung yao"],

    function cleanOutputText(value) {
      return (value || "")
        .toString()
        .replace(/[\u200B-\u200D\uFEFF\u2060]/g, " ")
        .replace(/\b(None|null|undefined)\b/gi, "")
        .replace(/\s+/g, " ")
        .replace(/\s*,\s*/g, ", ")
        .replace(/,\s*,+/g, ", ")
        .replace(/^,\s*|\s*,\s*$/g, "")
        .trim();
    }

    function normalizeText(text) {
      return cleanOutputText(text)
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/đ/g, "d")
        .replace(/[^\u0E00-\u0E7Fa-z0-9\s]/g, " ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function removeAdminPrefix(text) {
      return normalizeText(text)
        .replace(/^thanh pho\s+/, "")
        .replace(/^tinh\s+/, "")
        .replace(/^phuong\s+/, "")
        .replace(/^xa\s+/, "")
        .replace(/^thi tran\s+/, "")
        .replace(/^จังหวัด\s*/, "")
        .replace(/^อำเภอ\s*/, "")
        .replace(/^เขต\s*/, "")
        .replace(/^ตำบล\s*/, "")
        .replace(/^แขวง\s*/, "")
        .replace(/^ต\s+/, "")
        .replace(/^อ\s+/, "")
        .trim();
    }

    function getValue(row, key) {
      const value = row[key];
      if (value === undefined || value === null) return "";
      return cleanOutputText(value);
    }

    function getRealShopifyId(row) {
      return getValue(row, "Id") || getValue(row, "ID") || getValue(row, "Order ID");
    }

    function cleanPhone(phone) {
      return (phone || "").toString().replace(/[^0-9+]/g, "");
    }

    function cleanTHPhone(phone) {
      let digits = (phone || "").toString().replace(/\D/g, "");

      if (digits.startsWith("660")) {
        digits = "0" + digits.slice(3);
      } else if (digits.startsWith("66")) {
        digits = "0" + digits.slice(2);
      }

      return digits;
    }

    function cleanNumber(value) {
      if (!value) return 0;
      return Number(value.toString().replace(/[^0-9.-]/g, "")) || 0;
    }

    function cleanZip(value) {
      return (value || "").toString().replace(/[^0-9]/g, "");
    }

    function buildAddress(row) {
      return cleanOutputText([
        getValue(row, "Shipping Address1"),
        getValue(row, "Shipping Address2"),
        getValue(row, "Shipping City")
      ].filter(Boolean).join(", "));
    }

    function shortProductName(items, totalQty) {
      let productName = items.map(item => `${item.name} x ${item.qty}`).join("; ");

      if (productName.length > 250) {
        productName = `Skechers footwear - ${items.length} styles / ${totalQty} pairs`;
      }

      return productName;
    }

    function parseCsvFile(file, encoding) {
      return new Promise((resolve, reject) => {
        Papa.parse(file, {
          header: true,
          skipEmptyLines: true,
          encoding: encoding,
          complete: function(results) {
            resolve(results.data);
          },
          error: function(error) {
            reject(error);
          }
        });
      });
    }

    async function fetchWorkbook(filePath) {
      const response = await fetch(filePath + "?v=" + Date.now());

      if (!response.ok) {
        throw new Error("Cannot load backend template file: " + filePath);
      }

      const buffer = await response.arrayBuffer();

      return XLSX.read(buffer, {
        type: "array",
        cellDates: false,
        raw: true
      });
    }

    function groupShopifyOrders(shopifyRows) {
      const orders = {};
      let lastOrderId = "";
      const hasRealId = shopifyRows.some(row => getRealShopifyId(row));

      shopifyRows.forEach(row => {
        let orderNo = "";

        if (hasRealId) {
          const realId = getRealShopifyId(row);
          if (realId) lastOrderId = realId;
          orderNo = realId || lastOrderId;
        } else {
          orderNo = getValue(row, "Name");
        }

        if (!orderNo) return;

        if (!orders[orderNo]) {
          orders[orderNo] = {
            base: row,
            items: []
          };
        }

        const qty = cleanNumber(getValue(row, "Lineitem quantity")) || 1;
        const price = cleanNumber(getValue(row, "Lineitem price"));

        const itemName =
          getValue(row, "Lineitem name") ||
          getValue(row, "Lineitem sku") ||
          "Skechers product";

        orders[orderNo].items.push({
          name: itemName,
          qty: qty,
          price: price
        });
      });

      return orders;
    }

    function getFullAddressText(row) {
      return [
        getValue(row, "Shipping Name"),
        getValue(row, "Shipping Address1"),
        getValue(row, "Shipping Address2"),
        getValue(row, "Shipping Street"),
        getValue(row, "Shipping City"),
        getValue(row, "Shipping Province"),
        getValue(row, "Shipping Province Name"),
        getValue(row, "Shipping Zip")
      ].join(" ");
    }

    function extractVNAddressDatabase(workbook) {
      const citySheet = workbook.Sheets["City_list(2)"];
      const stateSheet = workbook.Sheets["State_list(2)"];

      if (!citySheet) {
        throw new Error("VN template missing hidden sheet: City_list(2)");
      }

      const cityRows = XLSX.utils.sheet_to_json(citySheet, { header: 1, defval: "" });
      const stateRows = stateSheet ? XLSX.utils.sheet_to_json(stateSheet, { header: 1, defval: "" }) : [];

      const addressDb = [];

      cityRows.slice(1).forEach(row => {
        const province = cleanOutputText(row[0]);
        const ward = cleanOutputText(row[1]);
        if (!province || !ward) return;

        addressDb.push({
          province,
          ward,
          provinceCore: removeAdminPrefix(province),
          wardNorm: normalizeText(ward),
          wardCore: removeAdminPrefix(ward)
        });
      });

      const stateList = stateRows
        .slice(1)
        .map(row => cleanOutputText(row[0]))
        .filter(Boolean)
        .map(state => ({
          state,
          stateCore: removeAdminPrefix(state)
        }));

      return { addressDb, stateList };
    }

    function scoreWardCandidate(normalizedText, entry) {
      const core = entry.wardCore;
      const wardNorm = entry.wardNorm;

      if (!core || core.length < 3) return 0;

      let score = 0;

      if (normalizedText.includes(wardNorm)) score += 900 + wardNorm.length;
      if (normalizedText.includes(core)) score += 350 + core.length;

      if (
        normalizedText.includes("phuong " + core) ||
        normalizedText.includes("xa " + core) ||
        normalizedText.includes(core + " ward") ||
        normalizedText.includes("ward " + core)
      ) {
        score += 1000;
      }

      return score;
    }

    function inferVNProvinceByAlias(normalizedText) {
      const aliases = [
        { keys: ["hcm", "tp hcm", "tphcm", "ho chi minh"], province: "Thành phố Hồ Chí Minh" },
        { keys: ["ha noi", "hanoi"], province: "Thành phố Hà Nội" },
        { keys: ["da nang"], province: "Thành phố Đà Nẵng" },
        { keys: ["can tho"], province: "Thành phố Cần Thơ" },
        { keys: ["hai phong"], province: "Thành phố Hải Phòng" },
        { keys: ["hue"], province: "Thành phố Huế" },
        { keys: ["buon ma thuot", "dak lak", "daklak", "đắk lắk"], province: "Tỉnh Đắk Lắk" }
      ];

      for (const alias of aliases) {
        for (const key of alias.keys) {
          if (normalizedText.includes(normalizeText(key))) return alias.province;
        }
      }

      return "";
    }

    function mapVNProvince(row, addressDb, stateList) {
      const normalized = normalizeText(getFullAddressText(row));

      const aliasProvince = inferVNProvinceByAlias(normalized);
      if (aliasProvince) return aliasProvince;

      const sortedStates = [...stateList].sort((a, b) => b.stateCore.length - a.stateCore.length);

      for (const state of sortedStates) {
        if (state.stateCore && state.stateCore.length >= 3 && normalized.includes(state.stateCore)) {
          return state.state;
        }
      }

      return "NEED CHECK";
    }

    function mapVNWard(row, province, addressDb) {
      const normalized = normalizeText(getFullAddressText(row));

      let candidates = addressDb;

      if (province && province !== "NEED CHECK") {
        candidates = candidates.filter(item => item.province === province);
      }

      const matched = candidates
        .map(item => ({ item, score: scoreWardCandidate(normalized, item) }))
        .filter(match => match.score > 0)
        .sort((a, b) => b.score - a.score);

      if (!matched.length) return "NEED CHECK";

      const bestScore = matched[0].score;
      const topMatches = matched.filter(match => match.score === bestScore);
      const uniqueWards = [...new Set(topMatches.map(match => match.item.ward))];

      if (uniqueWards.length === 1) return topMatches[0].item.ward;

      return "NEED CHECK";
    }

    function buildVNRows(shopifyRows, addressDb, stateList) {
      const orders = groupShopifyOrders(shopifyRows);
      const outputRows = [];
      const warnings = [];

      Object.keys(orders).forEach(orderNo => {
        const order = orders[orderNo];
        const base = order.base;
        const items = order.items;

        const totalQty = items.reduce((sum, item) => sum + item.qty, 0);
        const totalProductPrice = items.reduce((sum, item) => sum + (item.qty * item.price), 0);
        const productName = shortProductName(items, totalQty);

        const receiverName = getValue(base, "Shipping Name") || getValue(base, "Billing Name");
        const phone = cleanPhone(
          getValue(base, "Shipping Phone") ||
          getValue(base, "Billing Phone") ||
          getValue(base, "Phone")
        );

        const province = mapVNProvince(base, addressDb, stateList);
        const ward = mapVNWard(base, province, addressDb);
        const address = buildAddress(base);
        const orderValue = cleanNumber(getValue(base, "Total")) || totalProductPrice;

        if (!receiverName) warnings.push(`${orderNo}: missing receiver name`);
        if (!phone) warnings.push(`${orderNo}: missing phone`);
        if (!address) warnings.push(`${orderNo}: missing address`);
        if (province === "NEED CHECK") warnings.push(`${orderNo}: province needs checking`);
        if (ward === "NEED CHECK") warnings.push(`${orderNo}: ward needs checking`);

        outputRows.push([
          orderNo,
          receiverName,
          phone,
          province,
          ward,
          address,
          "",
          "",
          productName,
          totalQty,
          totalProductPrice,
          2,
          14,
          28,
          36,
          orderNo,
          orderValue,
          "N",
          "N",
          "Y",
          "N",
          "",
          "N",
          "",
          "N",
          "Người gửi trả",
          "",
          "",
          ""
        ]);
      });

      return { outputRows, warnings };
    }

    function extractTHAddressDatabase(workbook) {
      const stateSheet = workbook.Sheets["State_list"];
      const citySheet = workbook.Sheets["City_list"];
      const postalSheet = workbook.Sheets["Postal_Code_list"];

      if (!stateSheet || !citySheet || !postalSheet) {
        throw new Error("TH template missing State_list / City_list / Postal_Code_list.");
      }

      const stateRows = XLSX.utils.sheet_to_json(stateSheet, { header: 1, defval: "" });
      const cityRows = XLSX.utils.sheet_to_json(citySheet, { header: 1, defval: "" });
      const postalRows = XLSX.utils.sheet_to_json(postalSheet, { header: 1, defval: "" });

      const districtToProvince = {};
      cityRows.slice(1).forEach(row => {
        const district = cleanOutputText(row[0]);
        const province = cleanOutputText(row[1]);
        if (district && province) districtToProvince[district] = province;
      });

      const postalMap = {};
      postalRows.slice(1).forEach(row => {
        const district = cleanOutputText(row[0]);
        const province = cleanOutputText(row[1]);
        const postal = cleanZip(row[2]);
        if (!district || !province || !postal) return;
        postalMap[district + "|" + province] = postal;
      });

      const addressDb = [];

      stateRows.slice(1).forEach(row => {
        const subDistrict = cleanOutputText(row[0]);
        const district = cleanOutputText(row[1]);
        const province = districtToProvince[district] || "";
        const postal = postalMap[district + "|" + province] || "";

        if (!subDistrict || !district || !province) return;

        addressDb.push({
          subDistrict,
          district,
          province,
          postal,
          subCore: removeAdminPrefix(subDistrict),
          districtCore: removeAdminPrefix(district),
          provinceCore: removeAdminPrefix(province)
        });
      });

      return addressDb;
    }

    function inferTHProvince(row, normalizedText) {
      const provinceCode = getValue(row, "Shipping Province");
      const provinceName = getValue(row, "Shipping Province Name");

      if (thProvinceAliases[provinceCode]) return thProvinceAliases[provinceCode];

      const provinceNameNorm = normalizeText(provinceName);
      if (thProvinceAliases[provinceNameNorm]) return thProvinceAliases[provinceNameNorm];

      for (const key in thProvinceAliases) {
        if (normalizedText.includes(normalizeText(key))) {
          return thProvinceAliases[key];
        }
      }

      return "";
    }

    function scoreTHCandidate(normalizedText, entry) {
      let score = 0;

      if (entry.subCore && normalizedText.includes(entry.subCore)) score += 1000 + entry.subCore.length;
      if (entry.districtCore && normalizedText.includes(entry.districtCore)) score += 400 + entry.districtCore.length;
      if (entry.provinceCore && normalizedText.includes(entry.provinceCore)) score += 200 + entry.provinceCore.length;

      return score;
    }

    function findTHManualAlias(normalizedText) {
      const result = {};

      thManualAddressAliases.forEach(alias => {
        alias.keywords.forEach(keyword => {
          if (normalizedText.includes(normalizeText(keyword))) {
            if (alias.subDistrict) result.subDistrict = alias.subDistrict;
            if (alias.district) result.district = alias.district;
            if (alias.province) result.province = alias.province;
          }
        });
      });

      return result;
    }

    function mapTHAddress(row, addressDb) {
      const normalized = normalizeText(getFullAddressText(row));
      const manual = findTHManualAlias(normalized);

      let province = manual.province || inferTHProvince(row, normalized);
      let candidates = addressDb;

      if (province) {
        candidates = candidates.filter(item => item.province === province);
      }

      const matched = candidates
        .map(item => ({ item, score: scoreTHCandidate(normalized, item) }))
        .filter(match => match.score > 0)
        .sort((a, b) => b.score - a.score);

      let best = matched.length ? matched[0].item : null;

      if (manual.subDistrict) {
        const manualMatch = addressDb.find(item =>
          item.subDistrict === manual.subDistrict &&
          (!manual.district || item.district === manual.district) &&
          (!manual.province || item.province === manual.province)
        );

        if (manualMatch) best = manualMatch;
      }

      if (!best && manual.district && manual.province) {
        best = addressDb.find(item =>
          item.district === manual.district &&
          item.province === manual.province
        );
      }

      const subDistrict = best ? best.subDistrict : "NEED CHECK";
      const district = best ? best.district : (manual.district || "NEED CHECK");
      province = best ? best.province : (province || "NEED CHECK");

      let postal = cleanZip(getValue(row, "Shipping Zip"));
      if (!postal && best && best.postal) postal = best.postal;

      return {
        subDistrict,
        district,
        province,
        postal
      };
    }

    function buildTHRows(shopifyRows, addressDb) {
      const orders = groupShopifyOrders(shopifyRows);
      const outputRows = [];
      const warnings = [];

      Object.keys(orders).forEach(orderNo => {
        const order = orders[orderNo];
        const base = order.base;
        const items = order.items;

        const totalQty = items.reduce((sum, item) => sum + item.qty, 0);
        const totalProductPrice = items.reduce((sum, item) => sum + (item.qty * item.price), 0);
        const productName = shortProductName(items, totalQty);

        const receiverName = getValue(base, "Shipping Name") || getValue(base, "Billing Name");
        const phone = cleanTHPhone(
          getValue(base, "Shipping Phone") ||
          getValue(base, "Billing Phone") ||
          getValue(base, "Phone")
        );

        const mapped = mapTHAddress(base, addressDb);
        const address = buildAddress(base);
        const orderValue = cleanNumber(getValue(base, "Total")) || totalProductPrice;

        if (!receiverName) warnings.push(`${orderNo}: missing receiver name`);
        if (!phone) warnings.push(`${orderNo}: missing phone`);
        if (!address) warnings.push(`${orderNo}: missing address`);
        if (mapped.subDistrict === "NEED CHECK") warnings.push(`${orderNo}: sub-district needs checking`);
        if (mapped.district === "NEED CHECK") warnings.push(`${orderNo}: city/district needs checking`);
        if (mapped.province === "NEED CHECK") warnings.push(`${orderNo}: province needs checking`);
        if (!mapped.postal) warnings.push(`${orderNo}: postal code missing`);

        outputRows.push([
          receiverName,
          phone,
          address,
          mapped.subDistrict,
          mapped.district,
          mapped.province,
          mapped.postal,
          2,
          14,
          28,
          36,
          productName,
          totalQty,
          orderNo,
          "ชำระโดยผู้ส่ง",
          "N",
          "",
          "N",
          orderValue,
          ""
        ]);
      });

      return { outputRows, warnings };
    }

    async function generateTemplate() {
      const country = document.getElementById("country").value;
      const encoding = document.getElementById("encoding").value;
      const csvInput = document.getElementById("csvFile");
      const resultBox = document.getElementById("result");

      resultBox.style.display = "block";
      resultBox.className = "result";
      resultBox.innerText = "Processing...";

      try {
        if (!csvInput.files.length) {
          resultBox.className = "result error";
          resultBox.innerText = "Please upload Shopify order report CSV first.";
          return;
        }

        const shopifyRows = await parseCsvFile(csvInput.files[0], encoding);

        let workbook;
        let worksheet;
        let fileName;
        let outputRows;
        let warnings;

        if (country === "VN") {
          const spxWorkbook = await fetchWorkbook(VN_TEMPLATE_FILE);
          const { addressDb, stateList } = extractVNAddressDatabase(spxWorkbook);
          const result = buildVNRows(shopifyRows, addressDb, stateList);

          outputRows = result.outputRows;
          warnings = result.warnings;
          workbook = XLSX.utils.book_new();
          worksheet = XLSX.utils.aoa_to_sheet([vnHeaders, ...outputRows]);
          XLSX.utils.book_append_sheet(workbook, worksheet, "Tạo đơn (địa chỉ mới)");
          fileName = "SPX_Vietnam_Mapped_Template.xlsx";
        }

        if (country === "TH") {
          const spxWorkbook = await fetchWorkbook(TH_TEMPLATE_FILE);
          const addressDb = extractTHAddressDatabase(spxWorkbook);
          const result = buildTHRows(shopifyRows, addressDb);

          outputRows = result.outputRows;
          warnings = result.warnings;
          workbook = XLSX.utils.book_new();
          worksheet = XLSX.utils.aoa_to_sheet([thHeaders, ...outputRows]);
          XLSX.utils.book_append_sheet(workbook, worksheet, "Mass Order Creation-TH");
          fileName = "SPX_Thailand_Mapped_Template.xlsx";
        }

        if (!outputRows || outputRows.length === 0) {
          resultBox.className = "result error";
          resultBox.innerText = "No valid orders found. Please check whether this is the correct Shopify order report CSV.";
          return;
        }

        worksheet["!cols"] = [
          { wch: 24 }, { wch: 18 }, { wch: 60 }, { wch: 24 }, { wch: 24 },
          { wch: 24 }, { wch: 14 }, { wch: 14 }, { wch: 12 }, { wch: 12 },
          { wch: 12 }, { wch: 60 }, { wch: 12 }, { wch: 22 }, { wch: 18 },
          { wch: 14 }, { wch: 18 }, { wch: 14 }, { wch: 18 }, { wch: 28 }
        ];

        XLSX.writeFile(workbook, fileName);

        let message = `Generated successfully.\nCountry: ${country}\nTotal orders: ${outputRows.length}\nDownloaded file: ${fileName}`;

        if (warnings.length > 0) {
          message += `\n\nNeed checking:\n- ${warnings.join("\n- ")}`;
        } else {
          message += "\n\nNo missing address mapping detected. Please still test upload in SPX before live operation.";
        }

        resultBox.innerText = message;

      } catch (error) {
        resultBox.className = "result error";
        resultBox.innerText = "Generation failed: " + error.message;
      }
    }
  </script>
